# Checks the contact-form backend (Cloudflare Worker) every 6 hours. If the
# check fails, the workflow fails and GitHub emails the repo owner — so we
# hear about an outage even if no visitor reports it. (Unlike the old
# Supabase free-tier backend, Workers never auto-pause, so this is purely
# monitoring — no keep-alive needed.)
#
# Setup: set the CONTACT_ENDPOINT repository variable (Settings → Secrets and
# variables → Actions → Variables) to the deployed worker URL, e.g.
# https://cabell-contact-email.<subdomain>.workers.dev — same value as
# VITE_CONTACT_ENDPOINT in the Cloudflare Pages env.

name: Backend health check

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check contact-email worker
        env:
          ENDPOINT: ${{ vars.CONTACT_ENDPOINT }}
        run: |
          if [ -z "$ENDPOINT" ]; then
            echo "::warning::CONTACT_ENDPOINT repository variable is not set — skipping health check."
            exit 0
          fi
          curl --fail --silent --show-error --max-time 30 "$ENDPOINT/health"
          echo
          echo "Contact-email worker is healthy."

      # GitHub also emails the repo owner's GitHub address on failure; this
      # step additionally alerts the clinic tech inbox directly via the
      # Resend API. (FormSubmit was tried first but its bot protection
      # blocks requests from GitHub's runners.) Requires the
      # RESEND_HEALTH_KEY repository secret — a Resend API key.
      - name: Email tech@thecabellclinic.com on failure
        if: failure()
        env:
          RESEND_KEY: ${{ secrets.RESEND_HEALTH_KEY }}
        run: |
          if [ -z "$RESEND_KEY" ]; then
            echo "::warning::RESEND_HEALTH_KEY secret is not set — cannot email the failure alert."
            exit 0
          fi
          curl -sS --max-time 30 -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_KEY" \
            -H "Content-Type: application/json" \
            -d '{"from":"Cabell Clinic Monitor <forms@thomascabellmd.com>","to":["tech@thecabellclinic.com"],"subject":"[ALERT] Cabell Clinic form backend is DOWN","text":"The scheduled health check failed: the contact form backend (Cloudflare Worker) is unreachable.\n\nSite visitors submitting forms are being routed to the backup channel, so leads are still captured — but the primary backend needs attention.\n\nDetails: https://github.com/joeleavy/cabellclinic/actions"}'
