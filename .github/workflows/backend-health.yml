# Checks the contact-form backend (Cloudflare Worker) every 6 hours. If the
# check fails, the workflow fails and GitHub emails the repo owner — so we
# hear about an outage even if no visitor reports it. (Unlike the old
# Supabase free-tier backend, Workers never auto-pause, so this is purely
# monitoring — no keep-alive needed.)
#
# Setup: set the CONTACT_ENDPOINT repository variable (Settings → Secrets and
# variables → Actions → Variables) to the deployed worker URL, e.g.
# https://cabell-contact-email.<subdomain>.workers.dev — same value as
# VITE_CONTACT_ENDPOINT in the Cloudflare Pages env.

name: Backend health check

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check contact-email worker
        env:
          ENDPOINT: ${{ vars.CONTACT_ENDPOINT }}
        run: |
          if [ -z "$ENDPOINT" ]; then
            echo "::warning::CONTACT_ENDPOINT repository variable is not set — skipping health check."
            exit 0
          fi
          curl --fail --silent --show-error --max-time 30 "$ENDPOINT/health"
          echo
          echo "Contact-email worker is healthy."

      # GitHub also emails the repo owner's GitHub address on failure; this
      # step additionally alerts the clinic tech inbox directly, via the same
      # independent FormSubmit relay the site uses as its fallback channel.
      # (One-time: tech@thecabellclinic.com must click FormSubmit's
      # activation link before these deliver.)
      - name: Email tech@thecabellclinic.com on failure
        if: failure()
        run: |
          curl -sS --max-time 30 -X POST "https://formsubmit.co/ajax/tech@thecabellclinic.com" \
            -H "Content-Type: application/json" -H "Accept: application/json" \
            -H "Origin: https://thomascabellmd.com" -H "Referer: https://thomascabellmd.com/" \
            -d '{"_subject":"[ALERT] Cabell Clinic form backend is DOWN","name":"Backend health check","message":"The scheduled health check failed: the contact form backend (Cloudflare Worker) is unreachable. Site visitors submitting forms are being routed to the backup channel, so leads are still captured — but the primary backend needs attention. Details: https://github.com/joeleavy/cabellclinic/actions"}'
